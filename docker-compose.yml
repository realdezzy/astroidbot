services:
  postgres:
    image: postgres:17-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: astroidbot
      POSTGRES_PASSWORD: astroidbot
      POSTGRES_DB: astroidbot
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U astroidbot"]
      interval: 5s
      timeout: 5s
      retries: 5
    deploy:
      resources:
        limits:
          memory: 512M
          cpus: "1.0"

  redis:
    image: redis:7-alpine
    restart: unless-stopped
    volumes:
      - redisdata:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5
    deploy:
      resources:
        limits:
          memory: 256M
          cpus: "0.5"

  bot:
    build: .
    container_name: astroidbot
    restart: unless-stopped
    ports:
      - "8006:8006"
    env_file:
      - .env.docker
    volumes:
      - ./docker-entrypoint.sh:/docker-entrypoint.sh:ro
      - ./Docs:/app/Docs:ro
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    deploy:
      resources:
        limits:
          memory: 512M
          cpus: "2.0"

volumes:
  pgdata:
  redisdata:
